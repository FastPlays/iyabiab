<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕊️❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>K&R Memories</h2>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Enter</button>
    <p id="error"></p>
  </div>
</div>

<div id="siteContent">

  <div class="top">
    <a href="letter1.pdf" target="_blank" class="side-btn left">💌</a>
    <h1>Khloe ❤️ Rylen</h1>
    <a href="letter2.pdf" target="_blank" class="side-btn right">🌹</a>
    <p>Instagram Memories</p>
  </div>

  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Search messages...">
  </div>

  <div id="chat"></div>

</div>

<script>

const chat = document.getElementById("chat");
const siteContent = document.getElementById("siteContent");
siteContent.style.visibility = "hidden";

/* LOGIN */
function checkPassword() {
  const password = document.getElementById("passwordInput").value;

  if (password === "iloveyou") {
    document.getElementById("loginScreen").style.display = "none";
    siteContent.style.visibility = "visible";

    setTimeout(() => {
      chat.scrollTop = chat.scrollHeight;
    }, 100);

  } else {
    document.getElementById("error").innerText = "Wrong password";
  }
}

fetch('message1.html')
.then(res => res.text())
.then(html => {

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const messages = Array.from(doc.querySelectorAll('div.pam'));

  function cleanText(text = "") {

    text = text
      .replace(/❤️\s*Khloe/gi, "")
      .replace(/❤️\s*Rylen/gi, "")
      .replace(/❤\s*Khloe/gi, "")
      .replace(/❤\s*Rylen/gi, "")
      .replace(/\(edited\)/gi, "")
      .replace(/\s+/g, " ")
      .trim();

    const reelMatch = text.match(
      /https?:\/\/(www\.)?instagram\.com\/reel\/[^\s]+/
    );

    if (reelMatch) return reelMatch[0];

    return text;
  }

  function isSystemMessage(text = "") {
    const t = text.toLowerCase();
    return t.includes("liked a message") || t.includes("reacted");
  }

  const latestMap = new Map();

  /* ✅ FIX: proper dedupe system */
  messages.forEach(msg => {

    const sender = msg.querySelector('h2')?.innerText?.trim();
    const time = msg.querySelector('div._3-94._a6-o')?.innerText?.trim();
    const textBlock = msg.querySelector('div._a6-p');

    if (!sender || !time) return;

    let rawText = textBlock ? textBlock.innerText.trim() : "";
    if (isSystemMessage(rawText)) return;

    const isEdited = rawText.includes("(edited)");
    const text = cleanText(rawText);

    const key = sender + "|" + time;

    const existing = latestMap.get(key);

    /* KEEP ONLY MOST RECENT VERSION */
    if (!existing) {
      latestMap.set(key, { sender, time, text, isEdited });
    } else {
      if (isEdited) {
        latestMap.set(key, { sender, time, text, isEdited: true });
      }
    }
  });

  const finalMessages = Array.from(latestMap.values());

  /* keep chronological order */
  finalMessages.reverse();

  function render(filter = "") {

    chat.innerHTML = "";

    finalMessages.forEach(({ sender, time, text, isEdited }) => {

      const safeText = (text || "").toLowerCase();
      const safeSender = (sender || "").toLowerCase();

      if (
        filter &&
        !safeText.includes(filter.toLowerCase()) &&
        !safeSender.includes(filter.toLowerCase())
      ) return;

      const div = document.createElement("div");
      div.className = sender === "Rylen" ? "message you" : "message her";

      div.innerHTML = `
        <div class="name">${sender}</div>
        ${text ? `<div class="bubble">${text}</div>` : ""}
        <div class="meta">
          ${isEdited ? `<span class="edited">edited</span>` : ""}
        </div>
        <div class="time">${time}</div>
      `;

      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  }

  render();

  document.getElementById("searchInput")
    .addEventListener("input", e => render(e.target.value));

});

</script>

</body>
</html>
