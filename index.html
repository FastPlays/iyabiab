<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕊️❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">

    <h2>K&R Memories</h2>

    <input
      type="password"
      id="passwordInput"
      placeholder="Enter password"
    >

    <button onclick="checkPassword()">
      Enter
    </button>

    <p id="error"></p>

  </div>
</div>

<!-- SITE -->
<div id="siteContent">

  <!-- HEADER -->
  <div class="top">

    <a
      href="letter1.pdf"
      target="_blank"
      class="side-btn left"
    >
      💌
    </a>

    <h1>Khloe ❤️ Rylen</h1>

    <a
      href="letter2.pdf"
      target="_blank"
      class="side-btn right"
    >
      🌹
    </a>

    <p>Instagram Memories</p>

  </div>

  <!-- SEARCH -->
  <div class="search-box">

    <input
      id="searchInput"
      type="text"
      placeholder="Search messages..."
    >

  </div>

  <!-- CHAT -->
  <div id="chat"></div>

</div>

<script>

const chat =
  document.getElementById("chat");

const siteContent =
  document.getElementById("siteContent");

// HIDE SITE BEFORE PASSWORD
siteContent.style.visibility = "hidden";

// PASSWORD
function checkPassword() {

  const password =
    document.getElementById("passwordInput").value;

  if(password === "iloveyou") {

    document.getElementById("loginScreen")
      .style.display = "none";

    siteContent.style.visibility = "visible";

  } else {

    document.getElementById("error")
      .innerText = "Wrong password";

  }

}

// LOAD CHAT
fetch('message1.html')

.then(res => res.text())

.then(html => {

  const parser =
    new DOMParser();

  const doc =
    parser.parseFromString(
      html,
      'text/html'
    );

  const messages =
    Array.from(
      doc.querySelectorAll('div.pam')
    );

  // IMPORTANT:
  // reverse because Instagram export
  // is newest -> oldest
  messages.reverse();

  // REMOVE SYSTEM MESSAGES
  function isSystemMessage(text = "") {

    const t =
      text.toLowerCase();

    return (
      t.includes("liked a message") ||
      t.includes("reacted")
    );

  }

  // CLEAN TEXT
  function cleanText(text = "") {

    return text
      .replace(/❤Khloe/g, "")
      .replace(/❤Rylen/g, "")
      .replace(/❤️Khloe/g, "")
      .replace(/❤️Rylen/g, "")
      .replace(/\(edited\)/g, "")
      .replace(/\s+/g, " ")
      .trim();

  }

  const finalMessages = [];

  const editedTracker =
    new Map();

  messages.forEach(msg => {

    const sender =
      msg.querySelector('h2')
      ?.innerText
      ?.trim();

    const time =
      msg.querySelector('div._3-94._a6-o')
      ?.innerText
      ?.trim();

    const textBlock =
      msg.querySelector('div._a6-p');

    if (!sender || !time) return;

    let rawText =
      textBlock
      ? textBlock.innerText.trim()
      : "";

    if (isSystemMessage(rawText)) return;

    // DETECT LIKE
    const liked =
      rawText.includes("❤Khloe") ||
      rawText.includes("❤Rylen") ||
      rawText.includes("❤️Khloe") ||
      rawText.includes("❤️Rylen");

    const isEdited =
      rawText.includes("(edited)");

    const cleanedText =
      cleanText(rawText);

    // REELS ONLY SHOW URL
    const reelMatch =
      cleanedText.match(
        /https?:\/\/(www\.)?instagram\.com\/reel\/[^\s]+/
      );

    const finalText =
      reelMatch
      ? reelMatch[0]
      : cleanedText;

    // IMPORTANT:
    // identify original + edited copies
    const editKey =
      sender + "|" + time;

    // if edited version exists,
    // remove older unedited one
    if (isEdited) {

      editedTracker.set(editKey, true);

      // remove old copy
      const existingIndex =
        finalMessages.findIndex(m =>
          m.sender === sender &&
          m.time === time
        );

      if (existingIndex !== -1) {
        finalMessages.splice(existingIndex, 1);
      }

    } else {

      // skip if edited already exists
      if (editedTracker.has(editKey)) {
        return;
      }

    }

    finalMessages.push({
      sender,
      time,
      text: finalText,
      liked,
      isEdited
    });

  });

  // RENDER
  function render(filter = "") {

    chat.innerHTML = "";

    finalMessages.forEach(({
      sender,
      time,
      text,
      liked,
      isEdited
    }) => {

      const safeText =
        (text || "").toLowerCase();

      const safeSender =
        (sender || "").toLowerCase();

      if (
        filter &&
        !safeText.includes(filter.toLowerCase()) &&
        !safeSender.includes(filter.toLowerCase())
      ) {
        return;
      }

      const bubble =
        document.createElement('div');

      bubble.className =
        sender === 'Rylen'
        ? 'message you'
        : 'message her';

      bubble.innerHTML = `

        <div class="name">
          ${sender}
        </div>

        ${
          text
          ? `
            <div class="bubble-wrap">

              <div class="bubble">
                ${text}
              </div>

              ${
                liked
                ? `<div class="liked-tag">❤️</div>`
                : ``
              }

            </div>
          `
          : ''
        }

        <div class="meta">

          ${
            isEdited
            ? `<span class="edited">edited</span>`
            : ''
          }

        </div>

        <div class="time">
          ${time}
        </div>

      `;

      chat.appendChild(bubble);

    });

    // START AT BOTTOM
    chat.scrollTop =
      chat.scrollHeight;

  }

  // INITIAL RENDER
  render();

  // SEARCH
  document
    .getElementById("searchInput")

    .addEventListener("input", (e) => {

      render(e.target.value);

    });

});

</script>

</body>
</html>
