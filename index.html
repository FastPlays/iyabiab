<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕊️❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">

    <h2>K&R Memories</h2>

    <input
      type="password"
      id="passwordInput"
      placeholder="Enter password"
    >

    <button onclick="checkPassword()">
      Enter
    </button>

    <p id="error"></p>

  </div>
</div>

<!-- SITE -->
<div id="siteContent">

  <!-- HEADER -->
  <div class="top">

    <a
      href="letter1.pdf"
      target="_blank"
      class="side-btn left"
    >
      💌
    </a>

    <h1>Khloe ❤️ Rylen</h1>

    <a
      href="letter2.pdf"
      target="_blank"
      class="side-btn right"
    >
      🌹
    </a>

    <p>Instagram Memories</p>

  </div>

  <!-- SEARCH -->
  <div class="search-box">

    <input
      id="searchInput"
      type="text"
      placeholder="Search messages..."
    >

  </div>

  <!-- CHAT -->
  <div id="chat"></div>

</div>

<script>

const chat =
  document.getElementById("chat");

const siteContent =
  document.getElementById("siteContent");

// HIDE SITE
siteContent.style.visibility = "hidden";

// PASSWORD
function checkPassword() {

  const password =
    document.getElementById("passwordInput").value;

  if(password === "iloveyou") {

    document.getElementById("loginScreen")
      .style.display = "none";

    siteContent.style.visibility = "visible";

  } else {

    document.getElementById("error")
      .innerText = "Wrong password";

  }

}

// LOAD CHAT
fetch('message1.html')

.then(res => res.text())

.then(html => {

  const parser =
    new DOMParser();

  const doc =
    parser.parseFromString(
      html,
      'text/html'
    );

  const messages =
    Array.from(
      doc.querySelectorAll('div.pam')
    );

  const finalMessages = [];

  // CLEAN MESSAGE TEXT
  function cleanText(text = "") {

    return text
      .replace(/❤️Khloe/g, "")
      .replace(/❤️Rylen/g, "")
      .replace(/❤Khloe/g, "")
      .replace(/❤Rylen/g, "")
      .replace(/\(edited\)/g, "")
      .replace(/\s+/g, " ")
      .trim();

  }

  // DETECT SYSTEM MESSAGES
  function isSystemMessage(text = "") {

    const t =
      text.toLowerCase();

    return (
      t.includes("liked a message") ||
      t.includes("reacted")
    );

  }

  // DETECT LIKES
  function detectLiked(text = "") {

    return (
      text.includes("❤️Khloe") ||
      text.includes("❤️Rylen") ||
      text.includes("❤Khloe") ||
      text.includes("❤Rylen")
    );

  }

  // PROCESS MESSAGES
  messages.forEach(msg => {

    const sender =
      msg.querySelector('h2')
      ?.innerText
      ?.trim();

    const time =
      msg.querySelector('div._3-94._a6-o')
      ?.innerText
      ?.trim();

    const textBlock =
      msg.querySelector('div._a6-p');

    if (!sender || !time) return;

    let rawText =
      textBlock
      ? textBlock.innerText.trim()
      : "";

    if (isSystemMessage(rawText)) return;

    const isEdited =
      rawText.includes("(edited)");

    const liked =
      detectLiked(rawText);

    const text =
      cleanText(rawText);

    // REELS
    const reelMatch =
      text.match(
        /https?:\/\/(www\.)?instagram\.com\/reel\/[^\s]+/
      );

    const finalText =
      reelMatch
      ? reelMatch[0]
      : text;

    finalMessages.push({
      sender,
      time,
      text: finalText,
      isEdited,
      liked
    });

  });

  // REMOVE OLD VERSION OF EDITED MESSAGES
  const deduped = [];

  finalMessages.forEach((msg, index) => {

    const next =
      finalMessages[index + 1];

    // if same sender + same time
    // and next one is edited
    // remove old unedited one
    if (
      next &&
      msg.sender === next.sender &&
      msg.time === next.time &&
      !msg.isEdited &&
      next.isEdited
    ) {
      return;
    }

    deduped.push(msg);

  });

  // REVERSE SO NEWEST IS BOTTOM
  deduped.reverse();

  // RENDER
  function render(filter = "") {

    chat.innerHTML = "";

    deduped.forEach(({
      sender,
      time,
      text,
      isEdited,
      liked
    }) => {

      const safeText =
        (text || "").toLowerCase();

      const safeSender =
        (sender || "").toLowerCase();

      if (
        filter &&
        !safeText.includes(filter.toLowerCase()) &&
        !safeSender.includes(filter.toLowerCase())
      ) {
        return;
      }

      const bubble =
        document.createElement('div');

      bubble.className =
        sender === 'Rylen'
        ? 'message you'
        : 'message her';

      bubble.innerHTML = `

        <div class="name">
          ${sender}
        </div>

        ${
          text
          ? `
            <div class="bubble-wrap">

              <div class="bubble">
                ${text}
              </div>

              ${
                liked
                ? `
                  <div class="like-tag">
                    ❤️
                  </div>
                `
                : ''
              }

            </div>
          `
          : ''
        }

        <div class="meta">
          ${
            isEdited
            ? `<span class="edited">edited</span>`
            : ''
          }
        </div>

        <div class="time">
          ${time}
        </div>

      `;

      chat.appendChild(bubble);

    });

    // START AT BOTTOM
    chat.scrollTop =
      chat.scrollHeight;

  }

  // INITIAL
  render();

  // SEARCH
  document
    .getElementById("searchInput")

    .addEventListener("input", (e) => {

      render(e.target.value);

    });

});

</script>

</body>
</html>
