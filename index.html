<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🕊️❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-box">

      <h2>K&R Memories</h2>

      <input type="password" id="passwordInput" placeholder="Enter password">

      <button onclick="checkPassword()">Enter</button>

      <p id="error"></p>

    </div>
  </div>

  <!-- SITE -->
  <div id="siteContent" style="display:none;">

    <!-- HEADER -->
    <div class="top">

      <a href="document1.pdf" target="_blank" class="side-btn left">💌</a>

      <h1>Khloe ❤️ Rylen</h1>

      <a href="document2.pdf" target="_blank" class="side-btn right">🌹</a>

      <p>Instagram Memories</p>

    </div>

    <!-- SEARCH -->
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="Search messages...">
    </div>

    <!-- CHAT -->
    <div id="chat"></div>

  </div>

  <script>

    const chat = document.getElementById('chat');

    fetch('message1.html')
      .then(res => res.text())
      .then(html => {

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        const messages = doc.querySelectorAll('div.pam');

        const map = new Map();

        function cleanText(text = "") {

          const hasHeartTag =
            text.includes("❤️Khloe") ||
            text.includes("❤️Rylen") ||
            text.includes("❤Khloe") ||
            text.includes("❤Rylen");

          text = text
            .replace(/❤️Khloe/g, "")
            .replace(/❤️Rylen/g, "")
            .replace(/❤Khloe/g, "")
            .replace(/❤Rylen/g, "")
            .replace("(edited)", "")
            .replace(/\s+/g, " ")
            .trim();

          const reelMatch = text.match(
            /https?:\/\/(www\.)?instagram\.com\/reel\/[^\s]+/
          );

          return {
            text: reelMatch ? reelMatch[0] : text,
            liked: hasHeartTag
          };
        }

        function getReaction(text = "") {
          const t = text.toLowerCase();
          return (
            t.includes("liked a message") ||
            t.includes("reacted")
          );
        }

        messages.forEach(msg => {

          const sender =
            msg.querySelector('h2')?.innerText?.trim();

          const time =
            msg.querySelector('div._3-94._a6-o')?.innerText?.trim();

          const textBlock =
            msg.querySelector('div._a6-p');

          if (!sender || !time) return;

          let rawText =
            textBlock ? textBlock.innerText.trim() : "";

          if (getReaction(rawText)) {

            const lastKey =
              Array.from(map.keys()).pop();

            if (lastKey) map.get(lastKey).liked = true;

            return;
          }

          const cleaned = cleanText(rawText);

          const key = sender + "|" + time;

          map.set(key, {
            sender,
            time,
            text: cleaned.text,
            liked: cleaned.liked,
            isEdited: rawText.includes("(edited)")
          });

        });

        function render(filter = "") {

          chat.innerHTML = "";

          const fragment = document.createDocumentFragment();

          map.forEach(({ sender, time, text, liked, isEdited }) => {

            const sText = (text || "").toLowerCase();
            const sSender = (sender || "").toLowerCase();

            if (
              filter &&
              !sText.includes(filter.toLowerCase()) &&
              !sSender.includes(filter.toLowerCase())
            ) return;

            const div = document.createElement("div");

            div.className =
              sender === "Rylen" ? "message you" : "message her";

            div.innerHTML = `
              <div class="name">${sender}</div>

              ${text ? `<div class="bubble">${text}</div>` : ""}

              ${liked ? `<div class="liked-tag">❤️ liked</div>` : ""}

              <div class="meta">
                ${isEdited ? `<span class="edited">edited</span>` : ""}
              </div>

              <div class="time">${time}</div>
            `;

            fragment.appendChild(div);

          });

          chat.appendChild(fragment);
        }

        render();

        document.getElementById("searchInput")
          .addEventListener("input", e => render(e.target.value));

      });

    function checkPassword() {

      const pw = document.getElementById("passwordInput").value;

      if (pw === "iloveyou") {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("siteContent").style.display = "block";
      } else {
        document.getElementById("error").innerText = "Wrong password";
      }

    }

  </script>

</body>

</html>
