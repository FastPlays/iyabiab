<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🕊️❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-box">

      <h2>K&R Memories</h2>

      <input
        type="password"
        id="passwordInput"
        placeholder="Enter password"
      >

      <button onclick="checkPassword()">
        Enter
      </button>

      <p id="error"></p>

    </div>
  </div>

  <!-- SITE -->
  <div id="siteContent" style="display:none;">

    <!-- HEADER -->
    <div class="top">

      <a
        href="document1.pdf"
        target="_blank"
        class="side-btn left"
      >
        💌
      </a>

      <h1>Khloe ❤️ Rylen</h1>

      <a
        href="document2.pdf"
        target="_blank"
        class="side-btn right"
      >
        🌹
      </a>

    </div>

    <!-- SEARCH -->
    <div class="search-box">

      <input
        id="searchInput"
        type="text"
        placeholder="Search messages..."
      >

    </div>

    <!-- CHAT -->
    <div id="chat"></div>

  </div>

<script>

const chat = document.getElementById("chat");

let userHasScrolledUp = false;

// DETECT IF USER SCROLLED UP
chat.addEventListener("scroll", () => {

  const nearBottom =
    chat.scrollHeight -
    chat.scrollTop -
    chat.clientHeight < 100;

  userHasScrolledUp = !nearBottom;

});

// LOAD INSTAGRAM HTML
fetch("message1.html")

  .then(res => res.text())

  .then(html => {

    const doc =
      new DOMParser()
      .parseFromString(html, "text/html");

    // GET ALL MESSAGES
    let messages =
      Array.from(
        doc.querySelectorAll("div.pam")
      );

    // ENSURE CORRECT ORDER
    messages.reverse();

    const map = new Map();

    // CLEAN MESSAGE TEXT
    function cleanText(text = "") {

      const hasHeartTag =
        text.includes("❤️Khloe") ||
        text.includes("❤️Rylen") ||
        text.includes("❤Khloe") ||
        text.includes("❤Rylen");

      text = text

        .replace(/❤️Khloe/g, "")
        .replace(/❤️Rylen/g, "")
        .replace(/❤Khloe/g, "")
        .replace(/❤Rylen/g, "")

        .replace("(edited)", "")

        .replace(/\s+/g, " ")

        .trim();

      // REELS
      const reelMatch =
        text.match(
          /https?:\/\/(www\.)?instagram\.com\/reel\/[^\s]+/
        );

      return {

        text:
          reelMatch
            ? reelMatch[0]
            : text,

        liked:
          hasHeartTag

      };

    }

    // REACTION DETECTION
    function isReaction(text = "") {

      const t =
        text.toLowerCase();

      return (
        t.includes("liked a message") ||
        t.includes("reacted")
      );

    }

    // PROCESS MESSAGES
    messages.forEach(msg => {

      const sender =
        msg.querySelector("h2")
          ?.innerText
          ?.trim();

      const time =
        msg.querySelector("div._3-94._a6-o")
          ?.innerText
          ?.trim();

      const textBlock =
        msg.querySelector("div._a6-p");

      if (!sender || !time) return;

      let rawText =
        textBlock
          ? textBlock.innerText.trim()
          : "";

      // HANDLE REACTIONS
      if (isReaction(rawText)) {

        for (
          let i = map.size - 1;
          i >= 0;
          i--
        ) {

          const key =
            Array.from(map.keys())[i];

          const previous =
            map.get(key);

          if (
            previous &&
            !previous.liked
          ) {

            previous.liked = true;
            break;

          }

        }

        return;
      }

      const cleaned =
        cleanText(rawText);

      // PREVENT EDITED DUPLICATES
      const key =
        sender + "|" + time;

      map.set(key, {

        sender,
        time,

        text:
          cleaned.text,

        liked:
          cleaned.liked,

        isEdited:
          rawText.includes("(edited)")

      });

    });

    // AUTO SCROLL
    function scrollToBottom(force = false) {

      if (
        force ||
        !userHasScrolledUp
      ) {

        requestAnimationFrame(() => {

          setTimeout(() => {

            chat.scrollTop =
              chat.scrollHeight;

          }, 0);

        });

      }

    }

    // RENDER CHAT
    function render(filter = "") {

      chat.innerHTML = "";

      const fragment =
        document.createDocumentFragment();

      map.forEach(({

        sender,
        time,
        text,
        liked,
        isEdited

      }) => {

        const safeText =
          (text || "")
          .toLowerCase();

        const safeSender =
          (sender || "")
          .toLowerCase();

        if (

          filter &&

          !safeText.includes(
            filter.toLowerCase()
          ) &&

          !safeSender.includes(
            filter.toLowerCase()
          )

        ) return;

        const div =
          document.createElement("div");

        div.className =

          sender === "Rylen"

            ? "message you"

            : "message her";

        div.innerHTML = `

          <div class="name">
            ${sender}
          </div>

          ${text

            ? `<div class="bubble">${text}</div>`

            : ""

          }

          ${liked

            ? `<div class="liked-tag">❤️ liked</div>`

            : ""

          }

          <div class="meta">

            ${isEdited

              ? `<span class="edited">edited</span>`

              : ""

            }

          </div>

          <div class="time">
            ${time}
          </div>

        `;

        fragment.appendChild(div);

      });

      chat.appendChild(fragment);

      // START AT BOTTOM
      scrollToBottom(true);

    }

    // INITIAL RENDER
    render();

    // SEARCH
    document
      .getElementById("searchInput")
      .addEventListener(
        "input",
        e => render(e.target.value)
      );

  });

// PASSWORD SYSTEM
function checkPassword() {

  const pw =
    document.getElementById(
      "passwordInput"
    ).value;

  if (pw === "iloveyou") {

    document.getElementById(
      "loginScreen"
    ).style.display = "none";

    document.getElementById(
      "siteContent"
    ).style.display = "block";

  } else {

    document.getElementById(
      "error"
    ).innerText = "Wrong password";

  }

}

</script>

</body>
</html>
