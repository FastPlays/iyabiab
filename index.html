<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🕊️❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">

  <div class="login-box">

    <h2>K&R Memories</h2>

    <input
      type="password"
      id="passwordInput"
      placeholder="Enter password"
    >

    <button onclick="checkPassword()">
      Enter
    </button>

    <p id="error"></p>

  </div>

</div>

<!-- SITE -->
<div id="siteContent">

  <!-- HEADER -->
  <div class="top">

    <a
      href="letter1.pdf"
      target="_blank"
      class="side-btn left"
    >
      💌
    </a>

    <h1>Khloe ❤️ Rylen</h1>

    <a
      href="letter2.pdf"
      target="_blank"
      class="side-btn right"
    >
      🌹
    </a>

    <p>Instagram Memories</p>

  </div>

  <!-- SEARCH -->
  <div class="search-box">

    <input
      id="searchInput"
      type="text"
      placeholder="Search messages..."
    >

  </div>

  <!-- CHAT -->
  <div id="chat"></div>

</div>

<script>

const chat =
  document.getElementById("chat");

const siteContent =
  document.getElementById("siteContent");

// HIDE SITE UNTIL PASSWORD
siteContent.style.visibility = "hidden";

// PASSWORD
function checkPassword() {

  const password =
    document.getElementById("passwordInput").value;

  if (password === "iloveyou") {

    document.getElementById("loginScreen")
      .style.display = "none";

    siteContent.style.visibility = "visible";

  } else {

    document.getElementById("error")
      .innerText = "Wrong password";

  }

}

// LOAD INSTAGRAM HTML
fetch('message1.html')

.then(res => res.text())

.then(html => {

  const parser =
    new DOMParser();

  const doc =
    parser.parseFromString(
      html,
      'text/html'
    );

  const messages =
    doc.querySelectorAll('div.pam');

  const finalMessages = [];

  // CLEAN MESSAGE TEXT
  function cleanText(text = "") {

    return text
      .replace(/❤️Khloe/g, "")
      .replace(/❤️Rylen/g, "")
      .replace(/❤Khloe/g, "")
      .replace(/❤Rylen/g, "")
      .replace(/\(edited\)/g, "")
      .replace(/\s+/g, " ")
      .trim();

  }

  // REMOVE SYSTEM MESSAGES
  function isSystemMessage(text = "") {

    const t =
      text.toLowerCase();

    return (
      t.includes("liked a message") ||
      t.includes("reacted")
    );

  }

  // WHO REACTED
  function getReaction(text = "") {

    if (
      text.includes("❤️Khloe") ||
      text.includes("❤Khloe")
    ) {
      return "Khloe";
    }

    if (
      text.includes("❤️Rylen") ||
      text.includes("❤Rylen")
    ) {
      return "Rylen";
    }

    return null;

  }

  // PROCESS MESSAGES
  messages.forEach(msg => {

    const sender =
      msg.querySelector('h2')
      ?.innerText
      ?.trim();

    const time =
      msg.querySelector('div._3-94._a6-o')
      ?.innerText
      ?.trim();

    if (!sender || !time) return;

    const textBlock =
      msg.querySelector('div._a6-p');

    let rawText =
      textBlock
      ? textBlock.innerText.trim()
      : '';

    if (isSystemMessage(rawText)) return;

    const isEdited =
      rawText.includes('(edited)');

    const reaction =
      getReaction(rawText);

    let text =
      cleanText(rawText);

    // REELS
    const reelMatch =
      text.match(
        /https?:\/\/(www\.)?instagram\.com\/reel\/[^\s]+/
      );

    if (reelMatch) {
      text = reelMatch[0];
    }

    finalMessages.push({
      sender,
      time,
      text,
      isEdited,
      reaction
    });

  });

  // REMOVE OLD UNEDITED DUPLICATES
  const cleaned = [];

  finalMessages.forEach((msg, i) => {

    const next =
      finalMessages[i + 1];

    if (
      next &&
      msg.sender === next.sender &&
      msg.time === next.time &&
      !msg.isEdited &&
      next.isEdited
    ) {
      return;
    }

    cleaned.push(msg);

  });

  // NEWEST AT BOTTOM
  cleaned.reverse();

  // RENDER CHAT
  function render(filter = "") {

    chat.innerHTML = "";

    cleaned.forEach(msg => {

      const safeText =
        (msg.text || "").toLowerCase();

      const safeSender =
        (msg.sender || "").toLowerCase();

      if (
        filter &&
        !safeText.includes(filter.toLowerCase()) &&
        !safeSender.includes(filter.toLowerCase())
      ) {
        return;
      }

      const bubble =
        document.createElement('div');

      bubble.className =
        msg.sender === 'Rylen'
        ? 'message you'
        : 'message her';

      bubble.innerHTML = `

        <div class="name">
          ${msg.sender}
        </div>

        ${
          msg.text
          ? `
            <div class="bubble-wrap">

              <div class="bubble">
                ${msg.text}
              </div>

              ${
                msg.reaction
                ? `
                  <div class="liked">
                    ❤️ ${msg.reaction}
                  </div>
                `
                : ''
              }

            </div>
          `
          : ''
        }

        ${
          msg.isEdited
          ? `
            <div class="meta">
              <span class="edited">
                edited
              </span>
            </div>
          `
          : ''
        }

        <div class="time">
          ${msg.time}
        </div>

      `;

      chat.appendChild(bubble);

    });

    // SCROLL TO BOTTOM
    chat.scrollTop =
      chat.scrollHeight;

  }

  // INITIAL
  render();

  // SEARCH
  document
    .getElementById("searchInput")

    .addEventListener("input", e => {

      render(e.target.value);

    });

});

</script>

</body>
</html>
