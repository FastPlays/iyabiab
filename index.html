<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕊️❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">

    <h2>K&R Memories</h2>

    <input
      type="password"
      id="passwordInput"
      placeholder="Enter password"
    >

    <button onclick="checkPassword()">
      Enter
    </button>

    <p id="error"></p>

  </div>
</div>

<!-- SITE -->
<div id="siteContent">

  <!-- HEADER -->
  <div class="top">

    <a
      href="letter1.pdf"
      target="_blank"
      class="side-btn left"
    >
      💌
    </a>

    <h1>Khloe ❤️ Rylen</h1>

    <a
      href="letter2.pdf"
      target="_blank"
      class="side-btn right"
    >
      🌹
    </a>

    <p>Instagram Memories</p>

  </div>

  <!-- SEARCH -->
  <div class="search-box">

    <input
      id="searchInput"
      type="text"
      placeholder="Search messages..."
    >

  </div>

  <!-- CHAT -->
  <div id="chat"></div>

</div>

<script>

const chat =
  document.getElementById("chat");

const siteContent =
  document.getElementById("siteContent");

// HIDE SITE UNTIL PASSWORD
siteContent.style.visibility = "hidden";

// PASSWORD
function checkPassword() {

  const password =
    document.getElementById("passwordInput").value;

  if(password === "iloveyou") {

    document.getElementById("loginScreen")
      .style.display = "none";

    siteContent.style.visibility = "visible";

  } else {

    document.getElementById("error")
      .innerText = "Wrong password";

  }

}

// LOAD CHAT
fetch('message1.html')

.then(res => res.text())

.then(html => {

  const parser =
    new DOMParser();

  const doc =
    parser.parseFromString(
      html,
      'text/html'
    );

  const messages =
    Array.from(
      doc.querySelectorAll('div.pam')
    );

  // CLEAN MESSAGE TEXT
  function cleanText(text = "") {

    text = text

      // REMOVE REACTION TEXT
      .replace(/❤️\s*Khloe/gi, "")
      .replace(/❤️\s*Rylen/gi, "")
      .replace(/❤\s*Khloe/gi, "")
      .replace(/❤\s*Rylen/gi, "")

      // REMOVE EDITED
      .replace(/\(edited\)/gi, "")

      // CLEAN SPACES
      .replace(/\s+/g, " ")

      .trim();

    // REELS ONLY SHOW LINK
    const reelMatch =
      text.match(
        /https?:\/\/(www\.)?instagram\.com\/reel\/[^\s]+/
      );

    if (reelMatch) {
      return reelMatch[0];
    }

    return text;

  }

  // REMOVE INSTAGRAM SYSTEM MESSAGES
  function isSystemMessage(text = "") {

    const t =
      text.toLowerCase();

    return (
      t.includes("liked a message") ||
      t.includes("reacted")
    );

  }

  // RAW MESSAGES
  const messageMap = new Map();

messages.forEach(msg => {

  const sender =
    msg.querySelector('h2')
    ?.innerText
    ?.trim();

  const time =
    msg.querySelector('div._3-94._a6-o')
    ?.innerText
    ?.trim();

  const textBlock =
    msg.querySelector('div._a6-p');

  if (!sender || !time) return;

  let rawText =
    textBlock
    ? textBlock.innerText.trim()
    : "";

  // skip system messages
  const lower = rawText.toLowerCase();
  if (lower.includes("liked a message") || lower.includes("reacted")) return;

  const isEdited = rawText.includes("(edited)");

  const clean = rawText
    .replace(/\(edited\)/gi, "")
    .replace(/❤️\s*Khloe/gi, "")
    .replace(/❤️\s*Rylen/gi, "")
    .replace(/❤\s*Khloe/gi, "")
    .replace(/❤\s*Rylen/gi, "")
    .replace(/\s+/g, " ")
    .trim();

  const key = sender + "|" + time;

  const existing = messageMap.get(key);

  const data = {
    sender,
    time,
    text: clean,
    isEdited
  };

  // IMPORTANT FIX:
  // ALWAYS overwrite if edited exists OR if it's first entry
  if (!existing) {
    messageMap.set(key, data);
  } else {
    // if new one is edited, ALWAYS replace old one
    if (isEdited) {
      messageMap.set(key, data);
    }
  }

});

  // INSTAGRAM ORDER
const finalMessages = Array.from(messageMap.values());
finalMessages.reverse();

  // RENDER CHAT
  function render(filter = "") {

    chat.innerHTML = "";

    finalMessages.forEach(({
      sender,
      time,
      text,
      isEdited,
      likedBy
    }) => {

      const safeText =
        (text || "").toLowerCase();

      const safeSender =
        (sender || "").toLowerCase();

      // SEARCH FILTER
      if (
        filter &&
        !safeText.includes(filter.toLowerCase()) &&
        !safeSender.includes(filter.toLowerCase())
      ) {
        return;
      }

      const bubble =
        document.createElement('div');

      bubble.className =
        sender === 'Rylen'
        ? 'message you'
        : 'message her';

      bubble.innerHTML = `

        <div class="name">
          ${sender}
        </div>

        ${
          text
          ? `
            <div class="bubble">
              ${text}
            </div>
          `
          : ''
        }

        ${
          likedBy
          ? `
            <div class="liked">
              ❤️${likedBy}
            </div>
          `
          : ''
        }

        <div class="meta">

          ${
            isEdited
            ? `<span class="edited">edited</span>`
            : ''
          }

        </div>

        <div class="time">
          ${time}
        </div>

      `;

      chat.appendChild(bubble);

    });

    // START AT BOTTOM
    chat.scrollTop =
      chat.scrollHeight;

  }

  // INITIAL RENDER
  render();

  // SEARCH
  document
    .getElementById("searchInput")

    .addEventListener("input", (e) => {

      render(e.target.value);

    });

});

</script>

</body>
</html>
