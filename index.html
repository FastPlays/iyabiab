<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕊️❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">

  <div class="login-box">

    <h2>K&R Memories</h2>

    <input
      type="password"
      id="passwordInput"
      placeholder="Enter password"
    >

    <button onclick="checkPassword()">
      Enter
    </button>

    <p id="error"></p>

  </div>

</div>

<!-- SITE -->
<div id="siteContent">

  <!-- HEADER -->
  <div class="top">

    <a
      href="document1.pdf"
      target="_blank"
      rel="noopener noreferrer"
      class="side-btn left"
    >
      💌
    </a>

    <h1>Khloe ❤️ Rylen</h1>

    <a
      href="document2.pdf"
      target="_blank"
      rel="noopener noreferrer"
      class="side-btn right"
    >
      🌹
    </a>

    <p>Instagram Memories</p>

  </div>

  <!-- SEARCH -->
  <div class="search-box">

    <input
      id="searchInput"
      type="text"
      placeholder="Search messages..."
    >

  </div>

  <!-- CHAT -->
  <div id="chat"></div>

</div>

<script>

const chat =
  document.getElementById("chat");

const siteContent =
  document.getElementById("siteContent");

siteContent.style.visibility = "hidden";

/* LOGIN */
function checkPassword() {

  const password =
    document.getElementById("passwordInput").value;

  if (password === "iloveyou") {

    document.getElementById("loginScreen")
      .style.display = "none";

    siteContent.style.visibility = "visible";

  } else {

    document.getElementById("error")
      .innerText = "Wrong password";

  }

}

/* LOAD INSTAGRAM HTML */
fetch("message1.html")

.then(res => res.text())

.then(html => {

  const parser =
    new DOMParser();

  const doc =
    parser.parseFromString(
      html,
      "text/html"
    );

  const rawMessages =
    Array.from(
      doc.querySelectorAll("div.pam")
    );

  const latestMap =
    new Map();

  /* REACTION REGEX */
  const reactionRegex =
    /([\p{Emoji_Presentation}\p{Extended_Pictographic}])\s*(Khloe|Rylen)\s*$/u;

  /* CLEAN MESSAGE TEXT */
  function cleanText(text = "") {

    text = text

      /* REMOVE REACTION TAGS */
      .replace(reactionRegex, "")

      /* REMOVE EDITED TEXT */
      .replace(/\(edited\)/gi, "")

      /* CLEAN SPACING */
      .replace(/\s+/g, " ")

      .trim();

    /* REELS */
    const reelMatch =
      text.match(
        /https?:\/\/(www\.)?instagram\.com\/reel\/[^\s]+/
      );

    if (reelMatch) {
      return reelMatch[0];
    }

    return text;

  }

  /* REMOVE SYSTEM MESSAGES */
  function isSystemMessage(text = "") {

    const t =
      text.toLowerCase();

    return (
      t.includes("liked a message") ||
      t.includes("reacted")
    );

  }

  /* PARSE MESSAGES */
  rawMessages.forEach(msg => {

    const sender =
      msg.querySelector("h2")
      ?.innerText
      ?.trim();

    const time =
      msg.querySelector("div._3-94._a6-o")
      ?.innerText
      ?.trim();

    const textBlock =
      msg.querySelector("div._a6-p");

    if (!sender || !time) return;

    let rawText =
      textBlock
      ? textBlock.innerText.trim()
      : "";

    if (isSystemMessage(rawText)) {
      return;
    }

    /* DETECT REACTIONS */
    let likedBy = "";
    let reactionEmoji = "❤️";

    const reactionMatch =
      rawText.match(reactionRegex);

    if (reactionMatch) {

      reactionEmoji =
        reactionMatch[1];

      likedBy =
        reactionMatch[2];

    }

    const isEdited =
      rawText.includes("(edited)");

    const text =
      cleanText(rawText);

    /* BETTER UNIQUE KEY */
    const key =
      sender +
      "|" +
      time +
      "|" +
      rawText.slice(0, 40);

    const existing =
      latestMap.get(key);

    if (!existing) {

      latestMap.set(key, {
        sender,
        time,
        text,
        isEdited,
        likedBy,
        reactionEmoji
      });

    } else {

      latestMap.set(key, {

        sender,

        time,

        text:
          isEdited
          ? text
          : existing.text,

        isEdited:
          existing.isEdited ||
          isEdited,

        likedBy:
          likedBy ||
          existing.likedBy,

        reactionEmoji:
          reactionEmoji ||
          existing.reactionEmoji

      });

    }

  });

  /* FINAL ORDER */
  const finalMessages =
    Array.from(
      latestMap.values()
    ).reverse();

  /* DATE SEPARATORS */
  function getDateLabel(timeText = "") {

    const date =
      new Date(timeText);

    if (isNaN(date)) return "";

    return date.toLocaleDateString(
      "en-US",
      {
        year: "numeric",
        month: "long"
      }
    );

  }

  /* RENDER */
  function render(filter = "") {

    chat.innerHTML = "";

    let lastDate = "";

    finalMessages.forEach(({
      sender,
      time,
      text,
      isEdited,
      likedBy,
      reactionEmoji
    }) => {

      const safeText =
        (text || "").toLowerCase();

      const safeSender =
        (sender || "").toLowerCase();

      if (
        filter &&
        !safeText.includes(filter.toLowerCase()) &&
        !safeSender.includes(filter.toLowerCase())
      ) {
        return;
      }

      /* DATE DIVIDER */
      const currentDate =
        getDateLabel(time);

      if (
        currentDate &&
        currentDate !== lastDate
      ) {

        const divider =
          document.createElement("div");

        divider.className =
          "date-divider";

        divider.innerHTML =
          `<span>${currentDate}</span>`;

        chat.appendChild(divider);

        lastDate = currentDate;

      }

      /* MESSAGE */
      const div =
        document.createElement("div");

      div.className =
        sender === "Rylen"
        ? "message you"
        : "message her";

      div.innerHTML = `

        <div class="name">
          ${sender}
        </div>

        ${
          text
          ? `<div class="bubble">${text}</div>`
          : ""
        }

        ${
          likedBy
          ? `
          <div class="liked">
            ${reactionEmoji} ${likedBy}
          </div>
          `
          : ""
        }

        ${
          isEdited
          ? `
          <div class="meta">
            <span class="edited">
              edited
            </span>
          </div>
          `
          : ""
        }

        <div class="time">
          ${time}
        </div>

      `;

      chat.appendChild(div);

    });

    /* AUTO SCROLL */
    if (!filter) {

      chat.scrollTop =
        chat.scrollHeight;

    }

  }

  /* INITIAL RENDER */
  render();

  /* SEARCH */
  document
    .getElementById("searchInput")

    .addEventListener("input", e => {

      render(e.target.value);

    });

});

</script>

</body>
</html>
