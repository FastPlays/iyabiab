<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🕊️❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-box">
      <h2>K&R Memories</h2>

      <input
        type="password"
        id="passwordInput"
        placeholder="Enter password"
      >

      <button onclick="checkPassword()">
        Enter
      </button>

      <p id="error"></p>
    </div>
  </div>

  <!-- SITE -->
  <div id="siteContent" style="display:none;">

    <!-- TOP BAR -->
    <div class="top">

      <a
        href="document1.pdf"
        target="_blank"
        class="side-btn left"
      >
        💌
      </a>

      <h1>Khloe ❤️ Rylen</h1>

      <a
        href="document2.pdf"
        target="_blank"
        class="side-btn right"
      >
        🌹
      </a>

      <p>Instagram Memories</p>

    </div>

    <!-- SEARCH -->
    <div class="search-box">
      <input
        id="searchInput"
        type="text"
        placeholder="Search messages..."
      >
    </div>

    <!-- CHAT -->
    <div id="chat"></div>

  </div>

  <!-- CHAT SCRIPT -->
  <script>

    const chat = document.getElementById('chat');

    fetch('message1.html')
      .then(res => res.text())
      .then(html => {

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        const messages = doc.querySelectorAll('div.pam');

        const map = new Map();

        // CLEAN MESSAGE TEXT
        function cleanText(text = "") {

          text = text
            .replace("❤Khloe", "")
            .replace("❤Rylen", "")
            .replace("(edited)", "")
            .replace(/\s+/g, " ")
            .trim();

          // REEL LINKS ONLY
          const reelMatch = text.match(
            /https?:\/\/(www\.)?instagram\.com\/reel\/[^\s]+/
          );

          if (reelMatch) {
            return reelMatch[0];
          }

          return text;
        }

        // REMOVE SYSTEM MESSAGES
        function isSystemMessage(text = "") {

          const t = text.toLowerCase();

          return (
            t.includes("liked a message") ||
            t.includes("reacted")
          );
        }

        // LOOP THROUGH INSTAGRAM MESSAGES
        messages.forEach(msg => {

          const sender =
            msg.querySelector('h2')
              ?.innerText
              ?.trim();

          const time =
            msg.querySelector('div._3-94._a6-o')
              ?.innerText
              ?.trim();

          const textBlock =
            msg.querySelector('div._a6-p');

          if (!sender || !time) return;

          let rawText =
            textBlock
              ? textBlock.innerText.trim()
              : "";

          // REMOVE SYSTEM TEXT
          if (isSystemMessage(rawText)) return;

          const isEdited =
            rawText.includes("(edited)");

          const text = cleanText(rawText);

          // BETTER UNIQUE KEY
          const key =
            sender + "|" + time + "|" + rawText;

          const existing = map.get(key);

          const data = {
            sender,
            time,
            text,
            isEdited
          };

          // KEEP EDITED VERSION ONLY
          if (!existing) {

            map.set(key, data);

          } else {

            if (isEdited && !existing.isEdited) {
              map.set(key, data);
            }

          }

        });

        // RENDER CHAT
        function render(filter = "") {

          chat.innerHTML = "";

          map.forEach(({
            sender,
            time,
            text,
            isEdited
          }) => {

            const safeText =
              (text || "").toLowerCase();

            const safeSender =
              (sender || "").toLowerCase();

            if (
              filter &&
              !safeText.includes(filter.toLowerCase()) &&
              !safeSender.includes(filter.toLowerCase())
            ) {
              return;
            }

            const bubble =
              document.createElement('div');

            bubble.className =
              sender === 'Rylen'
                ? 'message you'
                : 'message her';

            bubble.innerHTML = `
              <div class="name">
                ${sender}
              </div>

              ${text
                ? `<div class="bubble">${text}</div>`
                : ''
              }

              <div class="meta">
                ${isEdited
                  ? `<span class="edited">edited</span>`
                  : ''
                }
              </div>

              <div class="time">
                ${time}
              </div>
            `;

            chat.appendChild(bubble);

          });

          // AUTO SCROLL TO BOTTOM
          chat.scrollTop = chat.scrollHeight;
        }

        // INITIAL RENDER
        render();

        // SEARCH
        document
          .getElementById("searchInput")
          .addEventListener("input", (e) => {

            render(e.target.value);

          });

      });

    // PASSWORD
    function checkPassword() {

      const password =
        document.getElementById("passwordInput").value;

      if (password === "iloveyou") {

        document.getElementById("loginScreen")
          .style.display = "none";

        document.getElementById("siteContent")
          .style.display = "block";

        document.body.style.overflow = "hidden";

      } else {

        document.getElementById("error")
          .innerText = "Wrong password";

      }

    }

  </script>

</body>

</html>
