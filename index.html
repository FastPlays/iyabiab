<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rylen ❤️ Khloe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top">
  <h1>Rylen ❤️ Khloe</h1>
  <p>Instagram Memories</p>
</div>
  
<div id="chat"></div>

<script>
fetch('./message1.html')
  .then(res => res.text())
  .then(html => {

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    const nodes = Array.from(doc.querySelectorAll('div.pam'));
    const chat = document.getElementById('chat');

    let lastRealMessage = null;

    function isSystemLike(text) {
      return /reacted|liked a message/i.test(text);
    }

    function isEdited(text) {
      return /\(edited\)/i.test(text);
    }

    nodes.forEach(node => {

      const sender = node.querySelector('h2')?.innerText?.trim();
      const time = node.querySelector('div._3-94._a6-o')?.innerText?.trim();
      const textRaw = node.querySelector('div._a6-p')?.innerText?.trim() || '';

      if (!sender || !time) return;

      // -------------------------
      // 1. HANDLE "LIKED / REACTED" SYSTEM MESSAGES
      // -------------------------
      if (isSystemLike(textRaw)) {
        if (lastRealMessage) {
          const likeTag = document.createElement('div');
          likeTag.className = 'like-below';
          likeTag.innerText = '❤ liked';
          lastRealMessage.appendChild(likeTag);
        }
        return; // NEVER render as bubble
      }

      // -------------------------
      // 2. HANDLE EDITED MESSAGES
      // -------------------------
      let isEdit = isEdited(textRaw);
      let cleanText = textRaw.replace('(edited)', '').trim();

      // If this looks like a duplicate edit artifact, skip old versions
      const alreadyRendered = lastRealMessage &&
        lastRealMessage.dataset &&
        lastRealMessage.dataset.fingerprint === cleanText;

      if (alreadyRendered && isEdit) {
        lastRealMessage.querySelector('.bubble').innerText = cleanText;
        lastRealMessage.querySelector('.meta')?.remove();

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerText = 'edited';
        lastRealMessage.appendChild(meta);

        return;
      }

      // -------------------------
      // 3. CREATE NORMAL MESSAGE
      // -------------------------
      const bubble = document.createElement('div');
      bubble.className = sender === 'Rylen' ? 'message you' : 'message her';

      bubble.dataset.fingerprint = cleanText;

      bubble.innerHTML = `
        <div class="name">${sender}</div>
        <div class="bubble">${cleanText}</div>
        <div class="time">${time}</div>
      `;

      if (isEdit) {
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerText = 'edited';
        bubble.appendChild(meta);
      }

      chat.appendChild(bubble);
      lastRealMessage = bubble;

    });

  });
</script>
</body>
</html>
